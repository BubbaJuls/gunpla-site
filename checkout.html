<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="resources/brand/logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="resources/brand/logo.png" />
  <title>Checkout — Gunpla Hobby PH</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page" data-page="checkout">
  <div id="site-header"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1>Checkout</h1>
        <p>Enter your shipping and payment details to complete your order.</p>
      </div>
    </section>

    <div class="container checkout-layout">
      <form id="checkout-form" class="checkout-form">
        <h2>Shipping Information</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="firstName" required />
          </div>
          <div class="form-group">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="lastName" required />
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" required />
        </div>
        <div class="form-group">
          <label for="address">Street Address</label>
          <input type="text" id="address" name="address" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" name="city" required />
          </div>
          <div class="form-group">
            <label for="province">Province</label>
            <input type="text" id="province" name="province" required />
          </div>
        </div>
        <div class="form-group">
          <label for="zip">ZIP Code</label>
          <input type="text" id="zip" name="zip" required />
        </div>

        <h2 style="margin-top:1.5rem">Payment Method</h2>
        <div class="form-group">
          <select id="payment" name="payment" required>
            <option value="cod">Cash on Delivery (COD)</option>
            <option value="gcash">GCash</option>
            <option value="maya">Maya</option>
            <option value="bank">Bank Transfer</option>
          </select>
        </div>

        <button type="submit" class="btn btn--primary btn--lg btn--full" style="margin-top:1rem">Place Order</button>
      </form>

      <aside id="checkout-summary" class="checkout-summary">
        <h2>Order Summary</h2>
      </aside>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/core/data.js"></script>
  <script src="js/core/cart.js"></script>
  <script src="js/core/order-receipt.js"></script>
  <script src="js/core/search-autocomplete.js"></script>
  <script src="js/core/ui.js"></script>
  <script src="js/pages/checkout-page.js"></script>
  <script src="js/core/animations.js"></script>
  <script src="js/core/chatbot.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
