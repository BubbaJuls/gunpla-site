<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="public/images/logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="public/images/logo.png" />
  <title>Shop — Gunpla Hobby PH</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page" data-page="shop">
  <div id="site-header"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1>Shop All Kits</h1>
        <p>Real Grade kits in stock now — HG, MG & PG collections coming soon.</p>
      </div>
    </section>

    <div class="container shop-layout">
      <aside class="shop-sidebar">
        <h3>Categories</h3>
        <button type="button" class="filter-btn" data-grade-filter="all">All Kits</button>
        <button type="button" class="filter-btn filter-btn--soon" data-grade-filter="HG">High Grade (HG) <span class="filter-soon">Soon</span></button>
        <button type="button" class="filter-btn" data-grade-filter="RG">Real Grade (RG)</button>
        <button type="button" class="filter-btn filter-btn--soon" data-grade-filter="MG">Master Grade (MG) <span class="filter-soon">Soon</span></button>
        <button type="button" class="filter-btn filter-btn--soon" data-grade-filter="PG">Perfect Grade (PG) <span class="filter-soon">Soon</span></button>
      </aside>

      <div>
        <div class="shop-toolbar">
          <form class="search" action="catalog.html" method="get" style="flex:1;max-width:400px">
            <input type="search" id="shop-search" name="q" placeholder="Search kits…" aria-label="Search" />
            <button type="submit" aria-label="Search">
              <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </button>
          </form>
          <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap">
            <span id="result-count" style="font-size:0.9rem;color:var(--muted)"></span>
            <select id="shop-sort" aria-label="Sort products">
              <option value="popular">Most Popular</option>
              <option value="rating">Top Rated</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
            </select>
          </div>
        </div>
        <div id="product-grid" class="product-grid product-grid--shop"></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/seed-reviews.js"></script>
  <script src="js/reviews.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/shop.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/chatbot.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
