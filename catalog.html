<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="resources/brand/logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="resources/brand/logo.png" />
  <title>Catalog — Gunpla Hobby PH · Road to 50 Flash Sale</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page" data-page="shop">
  <div id="site-header"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1>Shop All Kits</h1>
        <p>Road to 50 Flash Sale — countdown to the Gundam 50th in 2029. 35 authentic Bandai kits across HG, RG, MG, and PG.</p>
      </div>
    </section>

    <div class="container shop-layout">
      <aside class="shop-sidebar">
        <h3>Categories</h3>
        <button type="button" class="filter-btn" data-grade-filter="all">All Kits</button>
        <button type="button" class="filter-btn" data-grade-filter="HG">High Grade (HG)</button>
        <button type="button" class="filter-btn" data-grade-filter="RG">Real Grade (RG)</button>
        <button type="button" class="filter-btn" data-grade-filter="MG">Master Grade (MG)</button>
        <button type="button" class="filter-btn" data-grade-filter="PG">Perfect Grade (PG)</button>
      </aside>

      <div>
        <div class="shop-toolbar">
          <form class="search search--autocomplete" action="catalog.html" method="get" style="flex:1;max-width:400px">
            <div class="search__inner">
              <input type="search" id="shop-search" name="q" class="search__input" placeholder="Search kits…" aria-label="Search" autocomplete="off" />
              <ul class="search-suggestions" id="shop-search-suggestions" role="listbox" hidden></ul>
            </div>
            <button type="submit" aria-label="Search">
              <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </button>
          </form>
          <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap">
            <span id="result-count" style="font-size:0.9rem;color:var(--muted)"></span>
            <select id="shop-sort" aria-label="Sort products">
              <option value="popular">Most Popular</option>
              <option value="rating">Top Rated</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
            </select>
          </div>
        </div>
        <div id="product-grid" class="product-grid product-grid--shop"></div>
        <nav id="catalog-pagination" class="pagination" aria-label="Catalog pages" hidden></nav>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/core/data.js"></script>
  <script src="js/core/cart.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/core/seed-reviews.js"></script>
  <script src="js/core/seed-reviews-hgmpg.js"></script>
  <script src="js/core/reviews.js"></script>
  <script src="js/core/search-autocomplete.js"></script>
  <script src="js/core/ui.js"></script>
  <script src="js/pages/shop.js"></script>
  <script src="js/core/animations.js"></script>
  <script src="js/core/chatbot.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
